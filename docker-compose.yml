services:
  postgres:
    image: postgres:16-alpine
    container_name: flowforge-postgres
    environment:
      POSTGRES_DB: flowforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: FlowForge@123
    ports:
      - "5432:5432"
    volumes:
      - flowforge-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - flowforge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowforge-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - flowforge-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: flowforge-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    networks:
      - flowforge-network

  minio:
    image: minio/minio:latest
    container_name: flowforge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - flowforge-minio-data:/data
    restart: unless-stopped
    networks:
      - flowforge-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: flowforge-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
    networks:
      - flowforge-network

  seq:
    image: datalust/seq:latest
    container_name: flowforge-seq
    environment:
      ACCEPT_EULA: Y
    ports:
      - "5341:80"
    volumes:
      - flowforge-seq-data:/data
    restart: unless-stopped
    networks:
      - flowforge-network

volumes:
  flowforge-postgres-data:
  flowforge-minio-data:
  flowforge-seq-data:

networks:
  flowforge-network:
    driver: bridge
